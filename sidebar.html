<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dokter Sidebar</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- IBM Plex Sans -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome 5 -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
  />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            ibm: ["IBM Plex Sans", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    body {
      font-family: "IBM Plex Sans", sans-serif;
    }

    /* Custom scrollbar for sidebar */
    .sidebar-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .sidebar-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    .chevron-icon {
      transition: transform 0.25s ease;
    }
    .chevron-icon.open {
      transform: rotate(180deg);
    }

    .submenu {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    .submenu.open {
      max-height: 200px;
    }
  </style>
</head>
<body class="bg-gray-200 flex items-start justify-center min-h-screen p-8">

  <!-- ======================== SIDEBAR ======================== -->
  <aside
    class="relative w-[279px] min-h-[600px] h-screen max-h-screen flex flex-col overflow-hidden rounded-xl shadow-2xl"
    style="background: radial-gradient(621.91% 119.76% at 0% 0%, #006B47 0%, #1A9F70 100%);"
  >

    <!-- Scrollable content area -->
    <div class="flex flex-col px-4 py-6 gap-0 flex-1 overflow-y-auto sidebar-scroll relative z-10">

      <!-- ---- Dashboard ---- -->
      <div class="mb-1">
        <a
          href="#"
          class="flex items-center gap-4 px-4 py-3.5 rounded-lg hover:bg-white/10 transition-colors duration-200 group"
        >
          <div class="w-5 flex justify-center flex-shrink-0">
            <i class="fas fa-th-large text-white/70 text-[17.6px] group-hover:text-white/90 transition-colors"></i>
          </div>
          <span class="text-white/70 font-ibm text-base font-normal leading-6 group-hover:text-white/90 transition-colors">
            Dashboard
          </span>
        </a>
      </div>

      <!-- ---- Section: Manajemen ---- -->
      <div class="py-4">
        <div class="px-4">
          <span class="text-white/70 font-ibm text-xs font-normal tracking-[1.2px] uppercase">
            Manajemen
          </span>
        </div>
      </div>

      <!-- ---- Manajemen BHP (expandable) ---- -->
      <div class="mb-1">
        <button
          onclick="toggleSubmenu('bhp')"
          class="flex items-center gap-4 px-4 py-3.5 rounded-lg w-full hover:bg-white/10 transition-colors duration-200 group"
        >
          <div class="w-5 flex justify-center flex-shrink-0">
            <i class="fas fa-box text-white/70 text-[17.6px] group-hover:text-white/90 transition-colors"></i>
          </div>
          <span class="flex-1 text-left text-white/70 font-ibm text-base font-medium leading-6 group-hover:text-white/90 transition-colors">
            Manajemen BHP
          </span>
          <i
            id="bhp-chevron"
            class="fas fa-angle-down text-white/70 text-[13px] chevron-icon"
          ></i>
        </button>

        <!-- Submenu -->
        <div id="bhp-submenu" class="submenu px-2 pt-1 pb-1">
          <div class="pl-5 flex flex-col gap-1 border-l-2 border-[rgba(6,95,70,0.70)]">
            <a
              href="#"
              class="flex px-3 py-2 rounded-md hover:bg-white/10 transition-colors duration-200 group"
            >
              <span class="text-white/70 font-ibm text-base font-normal leading-5 group-hover:text-white/90 transition-colors">
                Data BHP
              </span>
            </a>
            <a
              href="#"
              class="flex px-3 py-2 rounded-md hover:bg-white/10 transition-colors duration-200 group"
            >
              <span class="text-white/70 font-ibm text-base font-normal leading-5 group-hover:text-white/90 transition-colors">
                Kategori BHP
              </span>
            </a>
          </div>
        </div>
      </div>

      <!-- ---- Stock Masuk ---- -->
      <div class="mb-1">
        <a
          href="#"
          class="flex items-center gap-4 pl-3 pr-4 py-3.5 rounded-lg hover:bg-white/10 transition-colors duration-200 group"
        >
          <div class="w-[30px] h-8 flex justify-center items-center rounded-xl flex-shrink-0">
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="opacity-70 group-hover:opacity-90 transition-opacity"
            >
              <g clip-path="url(#clip_stock)">
                <path
                  d="M7.99855 14.6639C11.6798 14.6639 14.664 11.6797 14.664 7.99847C14.664 4.31723 11.6798 1.33301 7.99855 1.33301C4.31732 1.33301 1.33309 4.31723 1.33309 7.99847C1.33309 11.6797 4.31732 14.6639 7.99855 14.6639Z"
                  stroke="white"
                  stroke-width="1.33309"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M7.99855 5.33228V10.6646"
                  stroke="white"
                  stroke-width="1.33309"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M5.33237 7.99854L7.99855 10.6647L10.6647 7.99854"
                  stroke="white"
                  stroke-width="1.33309"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </g>
              <defs>
                <clipPath id="clip_stock">
                  <rect width="15.9971" height="15.9971" fill="white" />
                </clipPath>
              </defs>
            </svg>
          </div>
          <span class="text-white/70 font-ibm text-base font-normal leading-6 group-hover:text-white/90 transition-colors">
            Stock Masuk
          </span>
        </a>
      </div>

      <!-- ---- Catat Pemakaian ---- -->
      <div class="mb-1">
        <a
          href="#"
          class="flex items-center gap-4 px-4 py-3.5 rounded-lg hover:bg-white/10 transition-colors duration-200 group"
        >
          <div class="w-5 flex justify-center flex-shrink-0">
            <i class="fas fa-pencil-alt text-white/70 text-[17.6px] group-hover:text-white/90 transition-colors"></i>
          </div>
          <span class="text-white/70 font-ibm text-base font-normal leading-6 group-hover:text-white/90 transition-colors">
            Catat Pemakaian
          </span>
        </a>
      </div>

      <!-- ---- Laporan Pemakaian ---- -->
      <div class="mb-1">
        <a
          href="#"
          class="flex items-center gap-4 px-4 py-3.5 rounded-lg hover:bg-white/10 transition-colors duration-200 group"
        >
          <div class="w-5 flex justify-center flex-shrink-0">
            <i class="fas fa-chart-bar text-white/70 text-[17.6px] group-hover:text-white/90 transition-colors"></i>
          </div>
          <span class="text-white/70 font-ibm text-base font-normal leading-6 group-hover:text-white/90 transition-colors">
            Laporan Pemakaian
          </span>
        </a>
      </div>

    </div>
    <!-- End scrollable content -->

    <!-- ---- Wave decoration (bottom) ---- -->
    <div class="absolute bottom-0 left-0 right-0 pointer-events-none select-none">
      <svg
        width="279"
        height="274"
        viewBox="0 0 278 274"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        class="w-full"
        preserveAspectRatio="xMidYMax meet"
      >
        <path
          d="M0 20.3058C46.3345 -6.76859 92.669 -6.76859 139.004 20.3058C185.338 47.3802 231.673 47.3802 278.007 20.3058V273H0V20.3058Z"
          fill="white"
          fill-opacity="0.05"
        />
        <path
          d="M0 84.8972C45.6356 57.1771 94.719 59.5854 139.004 84.8972C184.929 111.321 231.24 111.691 278.007 84.8972V272.798H0V84.8972Z"
          fill="white"
          fill-opacity="0.07"
        />
        <path
          d="M0 147.214C48.1548 121.098 96.806 122.098 139.004 147.214C182.62 174.911 229.303 174.626 278.007 147.214V273.098H0V147.214Z"
          fill="white"
          fill-opacity="0.08"
        />
      </svg>
    </div>

  </aside>
  <!-- ======================== END SIDEBAR ======================== -->

  <script>
    function toggleSubmenu(id) {
      const submenu = document.getElementById(id + "-submenu");
      const chevron = document.getElementById(id + "-chevron");

      submenu.classList.toggle("open");
      chevron.classList.toggle("open");
    }

    // Auto-open submenu on load for demo purposes
    // toggleSubmenu("bhp");
  </script>
</body>
</html>
