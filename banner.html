<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data BHP Banner</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- IBM Plex Sans + Bricolage Grotesque -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:wght@700&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome 5 -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
  />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            ibm: ["IBM Plex Sans", "sans-serif"],
            bricolage: ["Bricolage Grotesque", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    body {
      font-family: "IBM Plex Sans", sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-8">

  <!-- ======================== BANNER ======================== -->
  <div
    class="relative w-full max-w-6xl rounded-2xl overflow-hidden"
    style="background: radial-gradient(ellipse at 0% 0%, #006B47 0%, #1A9F70 60%, #1DB879 100%);"
  >

    <!-- Decorative circle shapes (background) -->
    <div class="absolute inset-0 pointer-events-none select-none overflow-hidden">
      <!-- Shape A (Top Right) -->
      <div class="absolute -top-[150px] -right-[50px] md:-top-[250px] md:-right-[100px] w-[300px] h-[300px] md:w-[500px] md:h-[500px] rounded-full bg-white opacity-5"></div>
      <!-- Shape B (Bottom Right) -->
      <div class="absolute -bottom-[150px] -right-[50px] md:-bottom-[300px] md:-right-[150px] w-[300px] h-[300px] md:w-[500px] md:h-[500px] rounded-full bg-white opacity-10"></div>
      <!-- Shape C (Bottom Curve) -->
      <div class="absolute -bottom-[400px] left-[50px] md:-bottom-[850px] md:left-[100px] w-[600px] h-[600px] md:w-[1000px] md:h-[1000px] rounded-full bg-white opacity-5"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 flex items-center justify-between gap-6 px-8 py-7 sm:px-10 sm:py-8">

      <!-- Left: Icon + Text -->
      <div class="flex items-center gap-5 min-w-0">

        <!-- Icon badge -->
        <div
          class="flex items-center justify-center w-14 h-14 rounded-2xl flex-shrink-0"
          style="background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);"
        >
          <i class="fas fa-users text-white text-2xl"></i>
        </div>

        <!-- Texts -->
        <div class="flex flex-col gap-1.5 min-w-0">
          <h1
            class="font-ibm font-bold text-white leading-tight"
            style="font-size: clamp(20px, 3vw, 30px);"
          >
            Data Bahan Habis Pakai
          </h1>
          <p
            class="font-ibm font-normal text-white/80 leading-relaxed hidden sm:block"
            style="font-size: clamp(12px, 1.3vw, 14px); max-width: 680px;"
          >
            Pantau stok, penggunaan, dan ketersediaan bahan habis pakai secara real-time
            untuk memastikan operasional tetap berjalan lancar.
          </p>
        </div>
      </div>

      <!-- Right: CTA Button -->
      <div class="flex-shrink-0">
        <button
          class="flex items-center gap-2 px-5 py-2.5 rounded-xl font-ibm font-semibold text-sm transition-all duration-200 hover:bg-gray-100 active:scale-95 whitespace-nowrap"
          style="background: #fff; color: #006B47; border: none;"
        >
          <span class="text-base font-bold leading-none">+</span>
          Tambah BHP Baru
        </button>
      </div>

    </div>
  </div>
  <!-- ======================== END BANNER ======================== -->

</body>
</html>
